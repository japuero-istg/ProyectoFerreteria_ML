services:
  postgres:
    image: postgres:16-alpine
    container_name: istg-postgresql
    environment:
      POSTGRES_USER: ferreteria
      POSTGRES_PASSWORD: ferreteria
      POSTGRES_DB: ferreteria_ml
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferreteria"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: istg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
